<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" fill="none" role="img" aria-label="Capital Galaxy dashboard preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c2733"/>
      <stop offset="100%" stop-color="#1a4a5e"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#aae0ee"/>
      <stop offset="100%" stop-color="#4ba6c0"/>
    </linearGradient>
    <linearGradient id="lineFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#aae0ee" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#aae0ee" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ec5d8"/>
      <stop offset="100%" stop-color="#3a8fa4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#0a1f29" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- ambient star dots -->
  <g fill="#aae0ee" opacity="0.55">
    <circle cx="40" cy="40" r="1.6"/>
    <circle cx="120" cy="80" r="1"/>
    <circle cx="640" cy="30" r="1.3"/>
    <circle cx="690" cy="120" r="1"/>
    <circle cx="20" cy="500" r="1.4"/>
    <circle cx="660" cy="520" r="1.2"/>
    <circle cx="700" cy="430" r="1"/>
    <circle cx="80" cy="540" r="1"/>
  </g>

  <!-- main app window -->
  <g filter="url(#shadow)">
    <rect x="50" y="40" width="620" height="440" rx="18" fill="url(#bg)"/>

    <!-- window controls -->
    <circle cx="74" cy="64" r="5" fill="#ff6b6b"/>
    <circle cx="92" cy="64" r="5" fill="#fbbf3a"/>
    <circle cx="110" cy="64" r="5" fill="#5fd07a"/>
    <rect x="240" y="56" width="240" height="16" rx="8" fill="#ffffff" fill-opacity="0.08"/>

    <!-- top bar -->
    <rect x="50" y="88" width="620" height="44" fill="#ffffff" fill-opacity="0.04"/>
    <text x="74" y="115" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Portfolio</text>
    <text x="160" y="115" font-family="Inter, sans-serif" font-size="13" fill="#aae0ee" opacity="0.7">Methods</text>
    <text x="240" y="115" font-family="Inter, sans-serif" font-size="13" fill="#aae0ee" opacity="0.7">Board</text>
    <text x="310" y="115" font-family="Inter, sans-serif" font-size="13" fill="#aae0ee" opacity="0.7">Road Paths</text>
    <circle cx="640" cy="110" r="12" fill="#aae0ee" fill-opacity="0.2"/>
    <circle cx="640" cy="110" r="6" fill="#aae0ee"/>

    <!-- KPI cards row -->
    <g>
      <rect x="74" y="156" width="180" height="78" rx="10" fill="#ffffff" fill-opacity="0.06"/>
      <text x="90" y="180" font-family="Inter, sans-serif" font-size="11" fill="#aae0ee" opacity="0.7">NET WORTH</text>
      <text x="90" y="208" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffffff">$248,930</text>
      <text x="90" y="224" font-family="Inter, sans-serif" font-size="10" fill="#5fd07a">▲ 12.4% MoM</text>

      <rect x="270" y="156" width="180" height="78" rx="10" fill="#ffffff" fill-opacity="0.06"/>
      <text x="286" y="180" font-family="Inter, sans-serif" font-size="11" fill="#aae0ee" opacity="0.7">CASH FLOW</text>
      <text x="286" y="208" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffffff">$ 4,210</text>
      <text x="286" y="224" font-family="Inter, sans-serif" font-size="10" fill="#5fd07a">▲ 3.1%</text>

      <rect x="466" y="156" width="180" height="78" rx="10" fill="#ffffff" fill-opacity="0.06"/>
      <text x="482" y="180" font-family="Inter, sans-serif" font-size="11" fill="#aae0ee" opacity="0.7">FOCUS HOURS</text>
      <text x="482" y="208" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffffff">28.5h</text>
      <text x="482" y="224" font-family="Inter, sans-serif" font-size="10" fill="#fbbf3a">this week</text>
    </g>

    <!-- chart card -->
    <g>
      <rect x="74" y="252" width="372" height="208" rx="12" fill="#ffffff" fill-opacity="0.05"/>
      <text x="92" y="278" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Portfolio performance</text>
      <text x="92" y="294" font-family="Inter, sans-serif" font-size="10" fill="#aae0ee" opacity="0.7">Last 12 months</text>

      <!-- grid lines -->
      <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="1">
        <line x1="92" y1="340" x2="430" y2="340"/>
        <line x1="92" y1="380" x2="430" y2="380"/>
        <line x1="92" y1="420" x2="430" y2="420"/>
      </g>

      <!-- area + line -->
      <path d="M 92 410 L 130 392 L 168 400 L 206 372 L 244 360 L 282 340 L 320 350 L 358 322 L 396 308 L 430 295 L 430 440 L 92 440 Z" fill="url(#lineFill)"/>
      <path d="M 92 410 L 130 392 L 168 400 L 206 372 L 244 360 L 282 340 L 320 350 L 358 322 L 396 308 L 430 295" stroke="url(#line)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- end dot -->
      <circle cx="430" cy="295" r="6" fill="#aae0ee" stroke="#0c2733" stroke-width="2"/>
      <rect x="402" y="262" width="74" height="22" rx="6" fill="#aae0ee"/>
      <text x="412" y="277" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0c2733">+18.2%</text>
    </g>

    <!-- bar / allocation card -->
    <g>
      <rect x="466" y="252" width="180" height="208" rx="12" fill="#ffffff" fill-opacity="0.05"/>
      <text x="482" y="278" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Allocation</text>

      <!-- bars -->
      <rect x="486" y="298" width="22" height="120" rx="3" fill="url(#bar)"/>
      <rect x="514" y="320" width="22" height="98" rx="3" fill="url(#bar)" opacity="0.9"/>
      <rect x="542" y="346" width="22" height="72" rx="3" fill="url(#bar)" opacity="0.8"/>
      <rect x="570" y="362" width="22" height="56" rx="3" fill="url(#bar)" opacity="0.7"/>
      <rect x="598" y="378" width="22" height="40" rx="3" fill="url(#bar)" opacity="0.6"/>

      <text x="482" y="436" font-family="Inter, sans-serif" font-size="9" fill="#aae0ee" opacity="0.7">Eq</text>
      <text x="510" y="436" font-family="Inter, sans-serif" font-size="9" fill="#aae0ee" opacity="0.7">Bd</text>
      <text x="538" y="436" font-family="Inter, sans-serif" font-size="9" fill="#aae0ee" opacity="0.7">RE</text>
      <text x="566" y="436" font-family="Inter, sans-serif" font-size="9" fill="#aae0ee" opacity="0.7">Cr</text>
      <text x="594" y="436" font-family="Inter, sans-serif" font-size="9" fill="#aae0ee" opacity="0.7">Csh</text>
    </g>
  </g>

  <!-- floating mini card: streak / wellness -->
  <g filter="url(#shadow)">
    <rect x="500" y="402" width="190" height="98" rx="14" fill="#ffffff"/>
    <circle cx="528" cy="438" r="18" fill="#fff3d6"/>
    <path d="M 522 438 l 5 5 l 9 -10" stroke="#f59e0b" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="558" y="432" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0c2733">7-day streak</text>
    <text x="558" y="448" font-family="Inter, sans-serif" font-size="10" fill="#3a8fa4">Daily check-in</text>
    <rect x="514" y="466" width="160" height="6" rx="3" fill="#e6f4f9"/>
    <rect x="514" y="466" width="120" height="6" rx="3" fill="#3a8fa4"/>
    <text x="514" y="490" font-family="Inter, sans-serif" font-size="9" fill="#3a8fa4" opacity="0.8">Goal: 10 days · 70%</text>
  </g>

  <!-- floating mini card: kanban task -->
  <g filter="url(#shadow)">
    <rect x="20" y="380" width="158" height="120" rx="14" fill="#ffffff"/>
    <text x="36" y="406" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0c2733">Today · Focus</text>
    <rect x="36" y="416" width="126" height="22" rx="5" fill="#e6f4f9"/>
    <circle cx="48" cy="427" r="4" fill="#3a8fa4"/>
    <text x="60" y="431" font-family="Inter, sans-serif" font-size="10" fill="#0c2733">Review portfolio</text>
    <rect x="36" y="444" width="126" height="22" rx="5" fill="#fff3d6"/>
    <circle cx="48" cy="455" r="4" fill="#f59e0b"/>
    <text x="60" y="459" font-family="Inter, sans-serif" font-size="10" fill="#0c2733">Set Q3 goals</text>
    <rect x="36" y="472" width="126" height="22" rx="5" fill="#dff5e3"/>
    <circle cx="48" cy="483" r="4" fill="#5fd07a"/>
    <text x="60" y="487" font-family="Inter, sans-serif" font-size="10" fill="#0c2733">Pay invoice ✓</text>
  </g>
</svg>
