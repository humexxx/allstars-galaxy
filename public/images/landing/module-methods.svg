<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none" role="img" aria-label="Investment methods illustration">
  <defs>
    <linearGradient id="mBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff3d6"/>
      <stop offset="100%" stop-color="#ffe1ad"/>
    </linearGradient>
  </defs>
  <rect width="240" height="200" rx="16" fill="url(#mBg)"/>
  <!-- connecting paths -->
  <g stroke="#d99412" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M 60 100 Q 90 60 120 60" />
    <path d="M 60 100 Q 90 100 120 100" />
    <path d="M 60 100 Q 90 140 120 140" />
    <path d="M 120 60 Q 150 60 180 80" />
    <path d="M 120 100 Q 150 100 180 100" />
    <path d="M 120 140 Q 150 140 180 120" />
  </g>
  <!-- root node -->
  <g>
    <circle cx="60" cy="100" r="18" fill="#fbbf3a" stroke="#d99412" stroke-width="2"/>
    <text x="60" y="105" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#7a5410">★</text>
  </g>
  <!-- middle nodes -->
  <g>
    <circle cx="120" cy="60" r="14" fill="#ffffff" stroke="#d99412" stroke-width="2"/>
    <circle cx="120" cy="100" r="14" fill="#ffffff" stroke="#d99412" stroke-width="2"/>
    <circle cx="120" cy="140" r="14" fill="#ffffff" stroke="#d99412" stroke-width="2"/>
  </g>
  <!-- right nodes -->
  <g>
    <rect x="166" y="68" width="36" height="24" rx="6" fill="#ffffff" stroke="#d99412" stroke-width="2"/>
    <rect x="166" y="88" width="36" height="24" rx="6" fill="#ffffff" stroke="#d99412" stroke-width="2"/>
    <rect x="166" y="108" width="36" height="24" rx="6" fill="#ffffff" stroke="#d99412" stroke-width="2"/>
  </g>
  <!-- labels -->
  <text x="184" y="85" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#7a5410">DCA</text>
  <text x="184" y="105" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#7a5410">ETF</text>
  <text x="184" y="125" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#7a5410">REIT</text>
</svg>
