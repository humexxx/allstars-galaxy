  <!-- chart card -->
  <rect x="92" y="40" width="128" height="120" rx="10" fill="#ffffff" stroke="#cfeaf2"/>
  <path d="M 102 138 L 122 122 L 138 130 L 156 100 L 178 90 L 200 70 L 212 60 L 212 150 L 102 150 Z" fill="url(#pFill)"/>
  <path d="M 102 138 L 122 122 L 138 130 L 156 100 L 178 90 L 200 70 L 212 60" stroke="url(#pLine)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="212" cy="60" r="4" fill="#5fd07a" stroke="#ffffff" stroke-width="2"/>
