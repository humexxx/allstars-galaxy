    <text x="48" y="152" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#7a5410">$</text>
    <circle cx="48" cy="124" r="20" fill="#fbbf3a" stroke="#d99412" stroke-width="2"/>
    <text x="48" y="128" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#7a5410">$</text>
    <circle cx="48" cy="100" r="20" fill="#fbbf3a" stroke="#d99412" stroke-width="2"/>
    <text x="48" y="104" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#7a5410">$</text>
