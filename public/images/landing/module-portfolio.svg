  </defs>
  <rect width="240" height="200" rx="16" fill="url(#pBg)"/>
  <!-- coin stack -->
  <g>
    <ellipse cx="48" cy="156" rx="22" ry="6" fill="#0c2733" opacity="0.08"/>
